<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Taaza — Fresh Grocery App Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B7A4D;
  --green-dark:#124F32;
  --green-soft:#E7F5EC;
  --green-soft2:#F1F9F3;
  --orange:#FF6B2C;
  --orange-soft:#FFEADC;
  --cream:#FBFAF6;
  --white:#FFFFFF;
  --ink:#16241C;
  --gray:#6E7B73;
  --gray-light:#98A39C;
  --line:#E7EBE7;
  --radius-lg:26px;
  --radius-md:18px;
  --radius-sm:12px;
  --shadow: 0 10px 30px -12px rgba(22,36,28,0.18);
  --shadow-sm: 0 4px 14px -6px rgba(22,36,28,0.14);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Plus Jakarta Sans', sans-serif;
  background: radial-gradient(circle at 20% 0%, #f3f8f4 0%, #e9eee9 45%, #dfe6e0 100%);
  color:var(--ink);
  min-height:100vh;
  display:flex; flex-direction:column; align-items:center;
  padding:28px 16px 60px;
}
.display{font-family:'Fraunces', serif;}

/* ---------- Top switcher ---------- */
.app-switch{
  display:flex; gap:6px; background:#fff; padding:5px; border-radius:999px;
  box-shadow: var(--shadow-sm); margin-bottom:18px; border:1px solid var(--line);
}
.app-switch button{
  border:none; background:transparent; padding:9px 20px; border-radius:999px;
  font-family:inherit; font-weight:700; font-size:13px; letter-spacing:.2px; color:var(--gray);
  cursor:pointer; transition:.25s;
}
.app-switch button.active{ background:var(--green); color:#fff; }

.proto-title{ text-align:center; margin-bottom:6px; }
.proto-title h1{ font-size:22px; font-weight:700; }
.proto-title p{ font-size:13px; color:var(--gray); max-width:480px; margin:4px auto 0; }

/* ---------- Screen chip nav (customer) ---------- */
.chip-row{
  display:flex; gap:8px; overflow-x:auto; max-width:412px; padding:14px 2px 6px;
  scrollbar-width:none;
}
.chip-row::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto; font-size:12.5px; font-weight:600; color:var(--green-dark);
  background:var(--green-soft); border:1px solid transparent; padding:8px 14px;
  border-radius:999px; cursor:pointer; white-space:nowrap; transition:.2s;
}
.chip.active{ background:var(--green); color:#fff; }
.chip:hover:not(.active){ background:#dcefe3; }

/* ---------- Phone frame ---------- */
.phone{
  width:390px; height:820px; background:var(--ink); border-radius:52px;
  padding:14px; box-shadow: var(--shadow); position:relative; margin-top:10px;
}
.phone-screen{
  width:100%; height:100%; background:var(--cream); border-radius:38px; overflow:hidden;
  position:relative; display:flex; flex-direction:column;
}
.notch{
  position:absolute; top:0; left:50%; transform:translateX(-50%); width:120px; height:26px;
  background:var(--ink); border-radius:0 0 18px 18px; z-index:50;
}
.statusbar{
  height:44px; flex:0 0 auto; display:flex; align-items:flex-end; justify-content:space-between;
  padding:0 26px 6px; font-size:12px; font-weight:700; color:var(--ink); z-index:5;
}
.screen-body{ flex:1; overflow-y:auto; -ms-overflow-style:none; scrollbar-width:none; position:relative;}
.screen-body::-webkit-scrollbar{display:none;}
.screen-fade{ animation: fadeIn .35s ease; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

/* ---------- Bottom nav ---------- */
.bottom-nav{
  flex:0 0 auto; display:flex; justify-content:space-around; align-items:center;
  padding:10px 6px 16px; background:#fff; border-top:1px solid var(--line); z-index:5;
}
.nav-item{ display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; width:58px;}
.nav-item svg{ width:22px; height:22px; stroke:var(--gray-light); fill:none; stroke-width:1.8; transition:.2s;}
.nav-item span{ font-size:10.5px; font-weight:600; color:var(--gray-light); transition:.2s;}
.nav-item.active svg{ stroke:var(--green); fill:var(--green-soft);}
.nav-item.active span{ color:var(--green); }
.nav-dot{ width:5px; height:5px; border-radius:50%; background:var(--orange); position:relative; top:-16px; left:9px;}

/* ---------- generic UI bits ---------- */
.px{padding-left:20px; padding-right:20px;}
.section-title{ display:flex; align-items:center; justify-content:space-between; margin:18px 0 10px;}
.section-title h3{ font-size:15.5px; font-weight:800;}
.section-title a{ font-size:12px; font-weight:700; color:var(--green);}
.badge{
  font-size:10px; font-weight:800; padding:3px 8px; border-radius:999px; letter-spacing:.3px;
}
.badge-green{ background:var(--green-soft); color:var(--green-dark);}
.badge-orange{ background:var(--orange-soft); color:#B84B12;}
.btn{
  border:none; cursor:pointer; font-family:inherit; font-weight:700; border-radius:999px;
  transition:.2s; display:inline-flex; align-items:center; justify-content:center; gap:6px;
}
.btn-primary{ background:var(--green); color:#fff; padding:14px 22px; font-size:14.5px; box-shadow:0 8px 18px -8px rgba(27,122,77,.6);}
.btn-primary:active{ transform:scale(.98); }
.btn-outline{ background:#fff; border:1.5px solid var(--green); color:var(--green); padding:10px 18px; font-size:13px;}
.btn-orange{ background:var(--orange); color:#fff; padding:14px 22px; font-size:14.5px; box-shadow:0 8px 18px -8px rgba(255,107,44,.6);}
.card{ background:#fff; border-radius:var(--radius-md); border:1px solid var(--line); }
.blob-img{
  border-radius:42% 58% 63% 37% / 41% 44% 56% 59%;
  overflow:hidden; position:relative; flex:0 0 auto; background:var(--green-soft);
}
.blob-img img{width:100%;height:100%;object-fit:cover;display:block;}
.stamp{
  position:absolute; top:8px; right:8px; width:44px; height:44px; border-radius:50%;
  background:var(--orange); color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:9px; font-weight:800; text-align:center; line-height:1.1; transform:rotate(-12deg);
  box-shadow:0 4px 10px -3px rgba(0,0,0,.35); border:2px dashed rgba(255,255,255,.7);
}
.qty-pill{ display:flex; align-items:center; gap:10px; background:var(--green); color:#fff; border-radius:999px; padding:6px 8px;}
.qty-pill button{ width:22px; height:22px; border-radius:50%; border:none; background:rgba(255,255,255,.25); color:#fff; font-weight:800; cursor:pointer;}
.stars{ color:var(--orange); font-size:12px; letter-spacing:1px;}
input, select, textarea{ font-family:inherit; }
::placeholder{ color:var(--gray-light); }

/* prevent broken img look */
img{ background:var(--green-soft); }
img.err{ display:none; }
.img-fallback{ display:none; align-items:center; justify-content:center; font-size:34px; }
.img-wrap{ position:relative; width:100%; height:100%; }

/* ---------- product card ---------- */
.product-card{
  width:150px; flex:0 0 auto; border-radius:var(--radius-md); background:#fff;
  border:1px solid var(--line); padding:10px; position:relative; box-shadow:var(--shadow-sm);
}
.product-card .blob-img{ width:100%; height:110px; margin-bottom:8px;}
.product-card h4{font-size:13px; font-weight:700; line-height:1.25;}
.product-card .unit{font-size:11px; color:var(--gray);}
.product-card .price-row{ display:flex; align-items:center; justify-content:space-between; margin-top:8px;}
.product-card .price{font-family:'Fraunces',serif; font-weight:600; font-size:15px;}
.add-btn{
  width:30px;height:30px;border-radius:50%; background:var(--green); color:#fff; border:none;
  font-size:18px; font-weight:700; cursor:pointer; box-shadow:0 6px 12px -5px rgba(27,122,77,.6);
}
.wish-btn{ position:absolute; top:16px; right:16px; width:26px; height:26px; border-radius:50%;
  background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; font-size:13px; cursor:pointer; z-index:2;}

/* horizontal scroller */
.hscroll{ display:flex; gap:12px; overflow-x:auto; padding:2px 20px 6px; scrollbar-width:none;}
.hscroll::-webkit-scrollbar{display:none;}

/* category pill */
.cat-tile{ flex:0 0 auto; width:78px; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;}
.cat-tile .circle{ width:64px; height:64px; border-radius:26px; display:flex; align-items:center; justify-content:center; font-size:28px;}
.cat-tile span{ font-size:11.5px; font-weight:700; text-align:center;}

/* banner */
.banner{
  margin:14px 20px 4px; border-radius:24px; padding:22px; position:relative; overflow:hidden;
  background:linear-gradient(120deg,var(--green) 0%, #2A9463 60%, #3CAE79 100%); color:#fff; min-height:120px;
}
.banner::after{ content:""; position:absolute; right:-30px; bottom:-40px; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.12);}
.banner h2{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; max-width:65%;}
.banner p{ font-size:12px; opacity:.9; margin-top:4px; max-width:60%;}
.banner .btn{ margin-top:12px;}

/* list rows */
.list-row{ display:flex; align-items:center; gap:12px; padding:13px 20px; border-bottom:1px solid var(--line); cursor:pointer;}
.list-row:last-child{border-bottom:none;}
.list-row .icon{ width:40px;height:40px;border-radius:12px; display:flex;align-items:center;justify-content:center; font-size:18px; flex:0 0 auto;}
.list-row .txt{flex:1;}
.list-row .txt h5{font-size:13.5px; font-weight:700;}
.list-row .txt p{font-size:11.5px; color:var(--gray);}
.chev{color:var(--gray-light); font-size:18px;}

/* search bar */
.searchbar{ display:flex; align-items:center; gap:8px; background:#fff; border:1.5px solid var(--line); border-radius:16px; padding:11px 14px; margin:0 20px;}
.searchbar input{ border:none; outline:none; flex:1; font-size:13.5px; background:transparent;}
.filter-btn{ width:38px;height:38px;border-radius:12px; background:var(--green); display:flex; align-items:center; justify-content:center; color:#fff; flex:0 0 auto; cursor:pointer;}

/* header block */
.hdr{ padding:16px 20px 4px; display:flex; align-items:center; justify-content:space-between;}
.hdr h1{font-size:19px; font-weight:800;}
.hdr .sub{font-size:12px; color:var(--gray); margin-top:2px;}
.round-icon-btn{ width:40px;height:40px;border-radius:14px; background:#fff; border:1px solid var(--line); display:flex; align-items:center;justify-content:center; cursor:pointer; position:relative;}

/* progress tracker */
.track-line{ position:relative; padding-left:34px; margin:6px 20px 20px;}
.track-step{ position:relative; padding:0 0 30px 0;}
.track-step::before{ content:""; position:absolute; left:-34px; top:2px; width:22px;height:22px;border-radius:50%; background:var(--line); border:3px solid #fff; box-shadow:0 0 0 2px var(--line);}
.track-step.done::before{ background:var(--green); box-shadow:0 0 0 2px var(--green);}
.track-step.active::before{ background:var(--orange); box-shadow:0 0 0 4px var(--orange-soft);}
.track-step::after{ content:""; position:absolute; left:-24px; top:24px; bottom:0; width:2px; background:var(--line);}
.track-step:last-child::after{display:none;}
.track-step.done::after{ background:var(--green);}
.track-step h5{font-size:13.5px; font-weight:800;}
.track-step p{font-size:11.5px; color:var(--gray); margin-top:2px;}

/* form */
.field{ margin:0 20px 14px;}
.field label{font-size:12px; font-weight:700; color:var(--gray); display:block; margin-bottom:6px;}
.field .input-box{ display:flex; align-items:center; background:#fff; border:1.5px solid var(--line); border-radius:14px; padding:12px 14px;}
.field input{ border:none; outline:none; flex:1; font-size:14px; background:transparent;}

/* toggle */
.toggle{ width:42px; height:24px; background:var(--line); border-radius:999px; position:relative; cursor:pointer; flex:0 0 auto;}
.toggle.on{background:var(--green);}
.toggle .dot{position:absolute; top:2px; left:2px; width:20px;height:20px; border-radius:50%; background:#fff; transition:.2s; box-shadow:0 1px 4px rgba(0,0,0,.3);}
.toggle.on .dot{left:20px;}

/* ---------- ADMIN ---------- */
.admin-wrap{ width:min(1180px, 96vw); background:#fff; border-radius:28px; box-shadow:var(--shadow); overflow:hidden; display:flex; min-height:720px; border:1px solid var(--line);}
.admin-side{ width:230px; background:var(--green-dark); color:#fff; flex:0 0 auto; display:flex; flex-direction:column; padding:22px 14px;}
.admin-logo{ display:flex; align-items:center; gap:10px; padding:0 8px 22px; font-family:'Fraunces',serif; font-size:20px; font-weight:600;}
.admin-logo .dot{width:10px;height:10px;border-radius:50%; background:var(--orange);}
.admin-nav-item{ display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:12px; font-size:13.5px; font-weight:600; color:#cfe3d7; cursor:pointer; margin-bottom:2px;}
.admin-nav-item.active{ background:rgba(255,255,255,.12); color:#fff;}
.admin-nav-item:hover:not(.active){ background:rgba(255,255,255,.06);}
.admin-main{ flex:1; padding:26px 32px; overflow-y:auto; max-height:900px;}
.admin-top{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:22px;}
.admin-top h2{font-size:21px; font-weight:800;}
.admin-top p{font-size:12.5px; color:var(--gray); margin-top:3px;}
.stat-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:22px;}
.stat-card{ background:var(--cream); border:1px solid var(--line); border-radius:18px; padding:16px;}
.stat-card .lbl{font-size:11.5px; color:var(--gray); font-weight:700;}
.stat-card .val{font-family:'Fraunces',serif; font-size:24px; font-weight:600; margin-top:6px;}
.stat-card .delta{font-size:11px; font-weight:700; margin-top:4px;}
.delta.up{color:var(--green);} .delta.down{color:#C24242;}
.panel{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:18px; margin-bottom:18px;}
.panel-hdr{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
.panel-hdr h3{font-size:14.5px; font-weight:800;}
table{ width:100%; border-collapse:collapse; font-size:13px;}
th{ text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.4px; color:var(--gray); padding:8px 10px; border-bottom:1px solid var(--line);}
td{ padding:11px 10px; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.pill-status{ font-size:11px; font-weight:800; padding:4px 10px; border-radius:999px;}
.st-active{background:var(--green-soft); color:var(--green-dark);}
.st-low{background:#FDEBEB; color:#C24242;}
.st-pending{background:var(--orange-soft); color:#B84B12;}
.st-delivered{background:var(--green-soft); color:var(--green-dark);}
.mini-bar-chart{ display:flex; align-items:flex-end; gap:10px; height:140px; padding-top:10px;}
.mini-bar-chart .bar{ flex:1; background:linear-gradient(180deg, #3CAE79, var(--green)); border-radius:8px 8px 4px 4px; position:relative;}
.mini-bar-chart .bar span{ position:absolute; top:-18px; left:0; right:0; text-align:center; font-size:10px; font-weight:700; color:var(--gray);}
.admin-btn{ background:var(--green); color:#fff; border:none; padding:9px 16px; border-radius:10px; font-size:12.5px; font-weight:700; cursor:pointer;}
.admin-btn.outline{ background:#fff; border:1.5px solid var(--line); color:var(--ink);}
.chip-cat{ display:inline-flex; align-items:center; gap:6px; background:var(--green-soft); color:var(--green-dark); font-size:11.5px; font-weight:700; padding:5px 10px; border-radius:999px;}
.thumb{width:38px;height:38px;border-radius:10px; object-fit:cover; background:var(--green-soft);}
.banner-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
.banner-tile{ border-radius:16px; overflow:hidden; border:1px solid var(--line); position:relative; height:110px;}
.banner-tile img{width:100%;height:100%;object-fit:cover;}
.banner-tile .ov{ position:absolute; inset:0; background:linear-gradient(0deg,rgba(0,0,0,.55),transparent 60%); display:flex; align-items:flex-end; padding:10px; color:#fff; font-size:12px; font-weight:700;}

@media (max-width:900px){
  .stat-grid{grid-template-columns:repeat(2,1fr);}
  .banner-grid{grid-template-columns:repeat(2,1fr);}
  .admin-side{width:70px;}
  .admin-side span.label{display:none;}
  .admin-logo span.label{display:none;}
}
</style>
</head>
<body>

<div class="app-switch">
  <button id="btn-customer" class="active" onclick="setApp('customer')">Customer App</button>
  <button id="btn-admin" onclick="setApp('admin')">Admin Panel</button>
</div>

<div class="proto-title">
  <h1 class="display">🥬 Taaza — Fresh, Sorted.</h1>
  <p>An interactive prototype. Tap categories, products, and nav icons to explore the flow, or jump straight to any screen below.</p>
</div>

<div id="chip-row" class="chip-row"></div>

<!-- ============ CUSTOMER PHONE ============ -->
<div class="phone" id="customer-view">
  <div class="notch"></div>
  <div class="phone-screen">
    <div class="statusbar"><span>9:41</span><span>●●●● 5G 🔋</span></div>
    <div class="screen-body screen-fade" id="screen-body"></div>
    <div class="bottom-nav" id="bottom-nav"></div>
  </div>
</div>

<!-- ============ ADMIN ============ -->
<div class="admin-wrap" id="admin-view" style="display:none;">
  <div class="admin-side">
    <div class="admin-logo"><div class="dot"></div><span class="label">Taaza Admin</span></div>
    <div id="admin-nav"></div>
  </div>
  <div class="admin-main" id="admin-main"></div>
</div>

<script>
/* ================= DATA ================= */
const IMG = {
  vegHero:"https://images.unsplash.com/photo-1540420773420-3366772f4999?q=80&w=800&auto=format&fit=crop",
  fruitHero:"https://images.unsplash.com/photo-1619566636858-adf3ef46400b?q=80&w=800&auto=format&fit=crop",

  tomato:"https://images.unsplash.com/photo-1546094324-9b6bd8a3f4bc?q=80&w=400&auto=format&fit=crop",
  spinach:"https://images.unsplash.com/photo-1576045057995-568f588f82fb?q=80&w=400&auto=format&fit=crop",
  banana:"https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?q=80&w=400&auto=format&fit=crop",
  apple:"https://images.unsplash.com/photo-1560806887-1e4cd0b6cbd6?q=80&w=400&auto=format&fit=crop",
  turmeric:"https://images.unsplash.com/photo-1615485500704-8e990f9900f7?q=80&w=400&auto=format&fit=crop",
  chili:"https://images.unsplash.com/photo-1583119912267-cc97c911e416?q=80&w=400&auto=format&fit=crop",
  carrot:"https://images.unsplash.com/photo-1447175008436-054170c2e979?q=80&w=400&auto=format&fit=crop",
  onion:"https://images.unsplash.com/photo-1508747703725-719777637510?q=80&w=400&auto=format&fit=crop",
  mango:"https://images.unsplash.com/photo-1591073113125-e46713c829ed?q=80&w=400&auto=format&fit=crop",
  grapes:"https://images.unsplash.com/photo-1537640538966-79f369143f8f?q=80&w=400&auto=format&fit=crop",
  cinnamon:"https://images.unsplash.com/photo-1552346154-21d32810aba3?q=80&w=400&auto=format&fit=crop",
  cardamom:"https://images.unsplash.com/photo-1599909533144-cd9c98290a10?q=80&w=400&auto=format&fit=crop",
  potato:"https://images.unsplash.com/photo-1518977676601-b53f82aba655?q=80&w=400&auto=format&fit=crop",
  broccoli:"https://images.unsplash.com/photo-1584270354949-1f8b1cec5b03?q=80&w=400&auto=format&fit=crop",
  avatar:"https://images.unsplash.com/photo-1633332755192-727a05c4013d?q=80&w=200&auto=format&fit=crop"
};
const EMOJI = {vegetables:"🥦",fruits:"🍎",spices:"🌶️"};

const PRODUCTS = [
  {id:1, name:"Vine Tomatoes", cat:"vegetables", unit:"500 g pack", price:38, mrp:48, img:IMG.tomato, emoji:"🍅", rating:4.6, stock:126, organic:true, desc:"Sun-ripened vine tomatoes, hand-picked daily from partner farms near Nashik. Juicy, tangy, perfect for curries, salads and chutneys."},
  {id:2, name:"Baby Spinach", cat:"vegetables", unit:"250 g bunch", price:22, mrp:28, img:IMG.spinach, emoji:"🥬", rating:4.4, stock:64, organic:true, desc:"Tender baby spinach leaves, triple-washed and ready to cook. Rich in iron and folate — great for saag, soups and smoothies."},
  {id:3, name:"Farm Carrots", cat:"vegetables", unit:"1 kg", price:34, mrp:40, img:IMG.carrot, emoji:"🥕", rating:4.5, stock:8, organic:false, desc:"Crisp, sweet carrots grown in the red soils of Ooty. High in beta-carotene, ideal for halwa, salads and juices."},

function img(url, emoji, extraStyle=""){
  return `<div class="img-wrap" style="${extraStyle}">
    <img src="${url}" style="width:100%;height:100%;object-fit:cover;display:block;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
    <div class="img-fallback" style="position:absolute;inset:0;background:var(--green-soft);">${emoji}</div>
  </div>`;
}
function money(n){ return "₹"+n; }
function stars(r){
  const full = Math.round(r);
  return `<span class="stars">${"★".repeat(full)}${"☆".repeat(5-full)}</span> <span style="font-size:11px;color:var(--gray);">${r}</span>`;
}
function productCard(p){
  const inWish = WISHLIST[p.id];
  const out = p.stock === 0;
  return `<div class="product-card" onclick="goProduct(${p.id})">
    <div class="wish-btn" onclick="event.stopPropagation(); toggleWish(${p.id})">${inWish?"❤️":"🤍"}</div>
    <div class="blob-img">${img(p.img,p.emoji)}${p.organic?`<div class="stamp">100%<br>ORGANIC</div>`:""}</div>
    <h4>${p.name}</h4>
    <div class="unit">${p.unit}</div>
    <div class="price-row">
      <div>
        <span class="price">${money(p.price)}</span>
        <span style="font-size:11px;color:var(--gray-light);text-decoration:line-through;margin-left:4px;">${money(p.mrp)}</span>
      </div>
      ${out ? `<span style="font-size:10px;font-weight:800;color:#C24242;">Sold out</span>` : `<button class="add-btn" onclick="event.stopPropagation(); addToCart(${p.id})">+</button>`}
    </div>
  </div>`;
}
function categoryTile(c){
  return `<div class="cat-tile" onclick="goCategory('${c.id}')">
    <div class="circle" style="background:${c.color};">${c.emoji}</div>
    <span>${c.name}</span>

}
